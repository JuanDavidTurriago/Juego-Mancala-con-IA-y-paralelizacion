services:
  motor:
    build: ../../motor
    ports:
      - "9000:9000"
    environment:
      OMP_NUM_THREADS: "4"
    networks:
      - mancala
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q Motor <<< $$(cat <&3)'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build: ../../backend
    ports:
      - "8000:8000"
    environment:
      MOTOR_URL: "http://motor:9000"
    depends_on:
      motor:
        condition: service_healthy
    networks:
      - mancala
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build: ../../frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mancala

networks:
  mancala:
    driver: bridge
