apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mancala
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "mancala-ip"
spec:
  rules:
    - host: mancala.8.232.201.150.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.mancala.8.232.201.150.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
