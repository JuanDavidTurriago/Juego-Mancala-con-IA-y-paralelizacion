name: SonarQube

on:
  push:
    branches: [main, Bryan]
  pull_request:
    branches: [main, Bryan]
  workflow_dispatch:

jobs:
  sonar:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SonarQube credentials
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::error::Configura SONAR_TOKEN en Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install compiler dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libgomp1

      - name: Build motor for analysis context
        run: |
          cmake -S motor -B motor/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build motor/build -j

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
