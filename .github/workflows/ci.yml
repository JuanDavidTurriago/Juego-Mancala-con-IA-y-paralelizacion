name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    name: Verify repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repo structure
        run: ls motor/ backend/ frontend/ deploy/

      - name: CI placeholder
        run: echo "CI inicial listo"

  build-motor:
    name: Build motor (optional)
    runs-on: ubuntu-latest
    needs: verify
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake g++ libgomp1

      - name: Compile motor
        run: |
          cmake -S motor -B motor/build \
            -DMANCALA_BUILD_SERVER=ON \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS="-fopenmp"
          cmake --build motor/build -j

      - name: Run motor unit tests
        run: ctest --test-dir motor/build --output-on-failure || ./motor/build/test_board

  publish-images:
    name: Publish container images
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set image prefix (lowercase for GHCR)
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_PREFIX=${{ env.REGISTRY }}/${owner}/mancala" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          tag="${{ github.sha }}"
          for component in motor backend frontend; do
            image="${IMAGE_PREFIX}-${component}:${tag}"
            docker build -t "${image}" "${component}"
            docker push "${image}"
          done
          echo "Images pushed under prefix ${IMAGE_PREFIX}-*:${tag}"
