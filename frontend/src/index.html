<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mancala (Kalah)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Mancala (Kalah)</h1>
      <div class="status" id="status">API: sin conectar</div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Solicitud</h2>
        <label>
          Algoritmo
          <select id="algo">
            <option value="alphabeta">alphabeta</option>
            <option value="mcts">mcts</option>
          </select>
        </label>
        <label>
          Profundidad (alphabeta)
          <input id="depth" type="number" value="8" min="1" />
        </label>
        <label>
          Simulaciones (mcts)
          <input id="sims" type="number" value="10000" min="1" />
        </label>
        <label>
          Hilos
          <input id="threads" type="number" value="4" min="1" />
        </label>
        <button id="btnMove">Solicitar jugada</button>
      </section>

      <section class="panel">
        <h2>Tablero (14 ints)</h2>
        <textarea id="board" spellcheck="false">[4,4,4,4,4,4,0,4,4,4,4,4,4,0]</textarea>
        <label>
          Side (0/1)
          <input id="side" type="number" value="0" min="0" max="1" />
        </label>
      </section>

      <section class="panel">
        <h2>Respuesta</h2>
        <div class="result-grid" aria-label="Resumen de la respuesta">
          <article class="result-card">
            <span>Movimiento</span>
            <strong id="resultMove">-</strong>
          </article>
          <article class="result-card">
            <span>Evaluación</span>
            <strong id="resultEvaluation">-</strong>
          </article>
          <article class="result-card">
            <span>Tiempo</span>
            <strong id="resultElapsed">-</strong>
          </article>
          <article class="result-card">
            <span>Algoritmo</span>
            <strong id="resultAlgo">-</strong>
          </article>
          <article class="result-card">
            <span>Nodos</span>
            <strong id="resultNodes">-</strong>
          </article>
          <article class="result-card">
            <span>Prunes</span>
            <strong id="resultPrunes">-</strong>
          </article>
          <article class="result-card">
            <span>Hilos usados</span>
            <strong id="resultThreads">-</strong>
          </article>
        </div>
        <pre id="out"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
