<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mancala Kalah</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="phase">Fase 3</p>
        <h1>Mancala Kalah</h1>
      </div>
      <div class="header-actions">
        <span id="apiStatus" class="status">API: verificando</span>
        <button id="resetButton" class="ghost-button" type="button">Reiniciar partida</button>
      </div>
    </header>

    <main class="layout">
      <section class="game-area" aria-label="Tablero de Mancala">
        <div class="turn-strip">
          <div>
            <span>Turno</span>
            <strong id="turnLabel">Jugador 1</strong>
          </div>
          <div>
            <span>Estado</span>
            <strong id="gameStatus">Listo</strong>
          </div>
        </div>

        <div class="board" id="board">
          <div class="store store-p2" aria-label="Kalaha Jugador 2">
            <span>Jugador 2</span>
            <strong id="storeP2">0</strong>
          </div>
          <div class="pit-row pit-row-top" id="topRow"></div>
          <div class="pit-row pit-row-bottom" id="bottomRow"></div>
          <div class="store store-p1" aria-label="Kalaha Jugador 1">
            <span>Jugador 1</span>
            <strong id="storeP1">0</strong>
          </div>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </section>

      <aside class="side-panel" aria-label="Panel de configuracion y estadisticas">
        <section class="panel-section">
          <h2>Configuración</h2>
          <label>
            Algoritmo
            <select id="algorithm">
              <option value="alphabeta">Alpha-Beta</option>
              <option value="mcts">MCTS</option>
            </select>
          </label>
          <div class="settings-grid">
            <label id="depthField">
              Profundidad
              <input id="depth" type="number" min="1" max="32" value="6" />
            </label>
            <label id="simulationsField" class="hidden">
              Simulaciones
              <input id="simulations" type="number" min="1" max="100000" value="1000" />
            </label>
            <label>
              Hilos
              <input id="threads" type="number" min="1" max="64" value="4" />
            </label>
          </div>
        </section>

        <section class="panel-section stats-section">
          <h2>Estadísticas</h2>
          <div class="stats-grid">
            <div class="stat">
              <span>Algoritmo activo</span>
              <strong id="statAlgorithm">Alpha-Beta</strong>
            </div>
            <div class="stat">
              <span id="statPrimaryLabel">Profundidad</span>
              <strong id="statPrimary">6</strong>
            </div>
            <div class="stat">
              <span>Tiempo</span>
              <strong id="statTime">0 ms</strong>
            </div>
            <div class="stat">
              <span id="statNodesLabel">Nodos</span>
              <strong id="statNodes">0</strong>
            </div>
            <div class="stat">
              <span id="statSecondaryLabel">Podas</span>
              <strong id="statSecondary">0</strong>
            </div>
            <div class="stat">
              <span>Última jugada</span>
              <strong id="statMove">-</strong>
            </div>
          </div>
        </section>

        <section id="finalPanel" class="panel-section final-panel hidden">
          <h2>Resultado</h2>
          <p id="finalText"></p>
          <button id="finalResetButton" type="button">Reiniciar partida</button>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
